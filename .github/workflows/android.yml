name: 🌱 Buena huerta APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Download Gradle Wrapper JAR y generar gradlew
        run: |
          mkdir -p gradle/wrapper

          # Descargar gradle-wrapper.jar
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

          # Crear gradlew si no existe en el repo
          if [ ! -f "gradlew" ]; then
            echo "gradlew no encontrado, generándolo..."
            cat > gradlew << 'GRADLEW'
#!/usr/bin/env sh
if [ -n "$JAVA_HOME" ]; then
  JAVACMD="$JAVA_HOME/bin/java"
else
  JAVACMD="java"
fi
APP_HOME="$(cd "$(dirname "$0")" && pwd -P)"
CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
exec "$JAVACMD" \
  -classpath "$CLASSPATH" \
  org.gradle.wrapper.GradleWrapperMain "$@"
GRADLEW
          fi

          chmod +x gradlew
          echo "✅ gradlew listo: $(ls -lh gradlew)"
          echo "✅ JAR listo: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: huerta-emoji-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: ✅ Build Summary
        run: |
          echo "## 🌱 Build exitoso!" >> $GITHUB_STEP_SUMMARY
          echo "**APK generado:** \`app-debug.apk\`" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/debug/app-debug.apk >> $GITHUB_STEP_SUMMARY
          echo "📥 Descargá el APK desde la sección **Artifacts**." >> $GITHUB_STEP_SUMMARY
