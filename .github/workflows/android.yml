name: 🌱 Buena huerta APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: huerta-app

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Instalar Gradle y generar wrapper
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 --distribution-type all
          chmod +x gradlew
          echo "✅ gradlew generado correctamente"
          head -5 gradlew

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('huerta-app/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: huerta-emoji-apk-${{ github.run_number }}
          path: huerta-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: ✅ Build Summary
        run: |
          echo "## 🌱 Build exitoso!" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/debug/app-debug.apk >> $GITHUB_STEP_SUMMARY
          echo "📥 Descargá el APK desde Artifacts." >> $GITHUB_STEP_SUMMARY
